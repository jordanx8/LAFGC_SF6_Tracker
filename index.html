<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Street Fighter MR Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #eee;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        #searchBox {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 6px;
            border: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #333;
            font-size: 15px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #555;
            text-align: left;
        }
        th {
            background: #444;
            cursor: pointer;
            user-select: none;
        }
        tr:hover {
            background: #444;
        }
        img.char-img {
            width: 60px;
            height: 60px;
            vertical-align: middle;
            margin-right: 10px;
            background: #111;
            border-radius: 6px;
            object-fit: contain;
        }
        img.rank-icon {
            width: 120px;
            height: 120px;
            padding: 2px;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
        }
        img.platform-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<h1>Louisiana SF6 MR Viewer</h1>
<div id="lastUpdated" style="text-align: center; margin-bottom: 10px; font-size: 14px; color: #aaa;"></div>
<div style="text-align: center; margin-bottom: 20px;">
    <label for="mrModeSelect" style="margin-right: 10px; font-size: 16px;">MR Mode:</label>
    <select id="mrModeSelect" style="padding: 8px 12px; font-size: 16px; border-radius: 6px; border: none; margin-right: 20px;">
        <option value="current">Current MR</option>
        <option value="highest">Highest MR</option>
    </select>
    
    <label for="characterFilter" style="margin-right: 10px; font-size: 16px;">Character:</label>
    <select id="characterFilter" style="padding: 8px 12px; font-size: 16px; border-radius: 6px; border: none; margin-right: 20px;">
        <option value="">All Characters</option>
    </select>
    
    <label style="margin-right: 15px; font-size: 16px;">
        <input type="checkbox" id="mainsFilter" style="margin-right: 5px; cursor: pointer;">
        Mains Only
    </label>
    
    <label style="font-size: 16px;">
        <input type="checkbox" id="mastersFilter" style="margin-right: 5px; cursor: pointer;">
        Masters Only
    </label>
</div>
<input type="text" id="searchBox" placeholder="Search by username..." />
<table id="mrTable">
    <thead>
        <tr>
            <th>#</th>
            <th data-sort="username">Username</th>
            <th data-sort="platform">Platform</th>
            <th data-sort="character">Character</th>
            <th data-sort="mr">MR</th>
            <th data-sort="rank">Rank</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<script>
// Character name → image filename mapping
const characterMap = {
    "AKUMA": "gouki",
    "GOUKI": "gouki",
    "DEE JAY": "deejay",
    "E. HONDA": "honda",
    "A.K.I.": "aki",
    "M. BISON": "vega",
    "C. VIPER": "cviper",
};
function toImageName(charName) {
    const cleaned = charName.toUpperCase().trim();
    if (characterMap[cleaned]) return characterMap[cleaned];
    return cleaned.toLowerCase().replace(/[^a-z0-9]/g, "");
}
function characterImageURL(name) {
    const img = toImageName(name);
    return `https://www.streetfighter.com/6/buckler/assets/images/material/character/character_${img}_l.png`;
}
// MR → Rank Icon (for Master rank players)
function getRankIcon(mr) {
    if (mr >= 1800)
        return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank42_s.png";
    if (mr >= 1700)
        return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank41_s.png";
    if (mr >= 1600)
        return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank40_s.png";
    return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank36_s.png";
}

// LP → Rank Icon (for non-Master rank players)
function getLPRankIcon(lp) {
    if (lp >= 23800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank35_s.png";
    if (lp >= 22600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank34_s.png";
    if (lp >= 21400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank33_s.png";
    if (lp >= 20200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank32_s.png";
    if (lp >= 19000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank31_s.png";
    if (lp >= 17800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank30_s.png";
    if (lp >= 16600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank29_s.png";
    if (lp >= 15400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank28_s.png";
    if (lp >= 14200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank27_s.png";
    if (lp >= 13000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank26_s.png";
    if (lp >= 12200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank25_s.png";
    if (lp >= 11400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank24_s.png";
    if (lp >= 10600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank23_s.png";
    if (lp >= 9800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank22_s.png";
    if (lp >= 9000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank21_s.png";
    if (lp >= 8200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank20_s.png";
    if (lp >= 7400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank19_s.png";
    if (lp >= 6600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank18_s.png";
    if (lp >= 5800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank17_s.png";
    if (lp >= 5000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank16_s.png";
    if (lp >= 4600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank15_s.png";
    if (lp >= 4200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank14_s.png";
    if (lp >= 3800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank13_s.png";
    if (lp >= 3400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank12_s.png";
    if (lp >= 3000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank11_s.png";
    if (lp >= 2600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank10_s.png";
    if (lp >= 2200) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank9_s.png";
    if (lp >= 1800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank8_s.png";
    if (lp >= 1400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank7_s.png";
    if (lp >= 1000) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank6_s.png";
    if (lp >= 800) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank5_s.png";
    if (lp >= 600) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank4_s.png";
    if (lp >= 400) return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank3_s.png";
    return "https://www.streetfighter.com/6/buckler/assets/images/material/rank/rank3_s.png"; // Default to lowest rank
}
async function loadData() {
    try {
        const response = await fetch("master_rates.json");
        const data = await response.json();
        
        // Handle new JSON structure with timestamp
        if (data.last_updated && data.players) {
            window.rawData = data.players;
            displayLastUpdated(data.last_updated);
        } else {
            // Fallback for old JSON structure
            window.rawData = data;
        }
        
        window.currentMode = "current";
        window.currentCharacterFilter = "";
        window.mainsOnly = false;
        window.mastersOnly = false;
        buildRowsFromMode("current");
        populateCharacterDropdown();
        enableSearch();
        enableSorting();
        enableModeSwitch();
        enableCharacterFilter();
        enableCheckboxFilters();
    } catch (e) {
        alert("Could not load master_rates.json.\nRun: python -m http.server 8000");
        console.error(e);
    }
}

function displayLastUpdated(isoTimestamp) {
    const date = new Date(isoTimestamp);
    const options = {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        timeZoneName: 'short'
    };
    const formattedDate = date.toLocaleString('en-US', options);
    document.getElementById('lastUpdated').textContent = `Last updated: ${formattedDate}`;
}

function buildRowsFromMode(mode) {
    const rows = [];
    const mrKey = mode === "current" ? "current_mr" : "highest_mr";
    
    // Flatten JSON → each row = one character
    for (const playerId in window.rawData) {
        const entry = window.rawData[playerId];
        const username = entry.username || "Unknown";
        const platform = entry.platform || null;
        const mrList = entry[mrKey] || [];
        const lpList = entry.lp || [];
        
        // Create a map of characters with MR
        const mrMap = new Map();
        for (const mrObj of mrList) {
            mrMap.set(mrObj.name, mrObj.mr);
        }
        
        // If in highest mode, also create a fallback map from current_mr
        const fallbackMrMap = new Map();
        if (mode === "highest") {
            const currentMrList = entry.current_mr || [];
            for (const mrObj of currentMrList) {
                fallbackMrMap.set(mrObj.name, mrObj.mr);
            }
        }
        
        // Create a map of characters with LP
        const lpMap = new Map();
        for (const lpObj of lpList) {
            lpMap.set(lpObj.name, lpObj.lp);
        }
        
        // Add all characters from LP list
        for (const lpObj of lpList) {
            const charName = lpObj.name;
            let mr = mrMap.get(charName);
            const lp = lpObj.lp;
            
            // If highest MR doesn't exist but current MR does, use current MR
            if (mr === undefined && mode === "highest") {
                mr = fallbackMrMap.get(charName);
            }
            
            if (mr !== undefined) {
                // Character has MR
                rows.push({
                    username,
                    character: charName,
                    mr: mr,
                    lp: lp,
                    rank: getRankIcon(mr),
                    platform: platform,
                    hasMR: true
                });
            } else {
                // Character has no MR, use LP
                rows.push({
                    username,
                    character: charName,
                    mr: "N/A",
                    lp: lp,
                    rank: getLPRankIcon(lp),
                    platform: platform,
                    hasMR: false
                });
            }
        }
    }
    
    // Sort: MR characters first (by MR desc), then non-MR characters (by LP desc)
    rows.sort((a, b) => {
        if (a.hasMR && b.hasMR) {
            return b.mr - a.mr; // Both have MR, sort by MR descending
        } else if (a.hasMR && !b.hasMR) {
            return -1; // MR characters come first
        } else if (!a.hasMR && b.hasMR) {
            return 1; // MR characters come first
        } else {
            return b.lp - a.lp; // Both have no MR, sort by LP descending
        }
    });
    
    window.allRows = rows;
    applyFilters();
}

function populateCharacterDropdown() {
    const characterSet = new Set();
    window.allRows.forEach(row => characterSet.add(row.character));
    
    const sortedCharacters = Array.from(characterSet).sort();
    const dropdown = document.getElementById("characterFilter");
    
    // Clear existing options except "All Characters"
    dropdown.innerHTML = '<option value="">All Characters</option>';
    
    sortedCharacters.forEach(char => {
        const option = document.createElement("option");
        option.value = char;
        option.textContent = char;
        dropdown.appendChild(option);
    });
}

function enableModeSwitch() {
    const modeSelect = document.getElementById("mrModeSelect");
    modeSelect.addEventListener("change", function() {
        window.currentMode = this.value;
        buildRowsFromMode(this.value);
        populateCharacterDropdown();
    });
}

function enableCharacterFilter() {
    const characterFilter = document.getElementById("characterFilter");
    characterFilter.addEventListener("change", function() {
        window.currentCharacterFilter = this.value;
        applyFilters();
    });
}

function applyFilters() {
    let filtered = window.allRows;
    
    // Apply Mains Only filter - show only highest MR/LP per player (their main character)
    if (window.mainsOnly) {
        const playerMainMap = new Map();
        
        // For each player, find their character with the highest MR/LP
        filtered.forEach(row => {
            const existing = playerMainMap.get(row.username);
            
            if (!existing) {
                playerMainMap.set(row.username, row);
            } else {
                // Compare: prioritize MR over LP
                const existingValue = existing.hasMR ? existing.mr : existing.lp;
                const currentValue = row.hasMR ? row.mr : row.lp;
                
                // If both have MR or both don't, compare values
                if (existing.hasMR === row.hasMR) {
                    if (currentValue > existingValue) {
                        playerMainMap.set(row.username, row);
                    }
                } else if (row.hasMR) {
                    // Current row has MR, existing doesn't - prefer MR
                    playerMainMap.set(row.username, row);
                }
            }
        });
        
        filtered = Array.from(playerMainMap.values());
    }
    
    // Apply Masters Only filter - show only rows with MR != 'N/A'
    if (window.mastersOnly) {
        filtered = filtered.filter(r => r.hasMR);
    }
    
    // Apply character filter
    if (window.currentCharacterFilter) {
        filtered = filtered.filter(r => r.character === window.currentCharacterFilter);
    }
    
    // Apply username search
    const searchBox = document.getElementById("searchBox");
    if (searchBox.value) {
        const searchTerm = searchBox.value.toLowerCase();
        filtered = filtered.filter(r => r.username.toLowerCase().includes(searchTerm));
    }
    
    populateTable(filtered);
}
function populateTable(rows) {
    const tbody = document.querySelector("#mrTable tbody");
    tbody.innerHTML = "";
    rows.forEach((r, index) => {
        const tr = document.createElement("tr");
        const charImg = characterImageURL(r.character);
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${r.username}</td>
            <td>
                <img class="platform-icon" src="${r.platform}" onerror="this.style.display='none'">
            </td>
            <td>
                <img class="char-img" src="${charImg}" onerror="this.style.display='none'">
                ${r.character}
            </td>
            <td>${r.mr}</td>
            <td>
                <img class="rank-icon" src="${r.rank}">
            </td>
        `;
        tbody.appendChild(tr);
    });
}
// Search by username
function enableSearch() {
    const searchBox = document.getElementById("searchBox");
    searchBox.addEventListener("input", function () {
        applyFilters();
    });
}
// Click sorting
function enableSorting() {
    let sortDirection = 1;
    document.querySelectorAll("#mrTable th").forEach(th => {
        th.addEventListener("click", () => {
            const key = th.getAttribute("data-sort");
            sortDirection *= -1;
            allRows.sort((a, b) => {
                if (key === "mr") {
                    // Handle MR sorting: MR values first, then LP values
                    const aVal = a.hasMR ? a.mr : (a.lp || 0);
                    const bVal = b.hasMR ? b.mr : (b.lp || 0);
                    
                    // If both have MR or both don't have MR, sort normally
                    if (a.hasMR === b.hasMR) {
                        return (aVal - bVal) * sortDirection;
                    }
                    // Otherwise, MR characters come first when sorting descending
                    if (sortDirection > 0) {
                        return a.hasMR ? 1 : -1;
                    } else {
                        return a.hasMR ? -1 : 1;
                    }
                }
                if (key === "rank") return 0;
                if (key === "platform") return (a.platform || "").localeCompare(b.platform || "") * sortDirection;
                return a[key].localeCompare(b[key]) * sortDirection;
            });
            populateTable(allRows);
        });
    });
}

function enableCheckboxFilters() {
    const mainsCheckbox = document.getElementById("mainsFilter");
    const mastersCheckbox = document.getElementById("mastersFilter");
    
    mainsCheckbox.addEventListener("change", function() {
        window.mainsOnly = this.checked;
        applyFilters();
    });
    
    mastersCheckbox.addEventListener("change", function() {
        window.mastersOnly = this.checked;
        applyFilters();
    });
}

loadData();
</script>
</body>
</html>
