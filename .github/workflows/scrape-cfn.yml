name: Scrape CFN Data

on:
  schedule:
    # Run 15min before every 2nd hour
    - cron: '45 */2 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Chrome and ChromeDriver
        id: setup-chrome
        uses: nanasess/setup-chromedriver@v2
        
      - name: Display Chrome and ChromeDriver versions
        run: |
          (Get-Item "C:\Program Files\Google\Chrome\Application\chrome.exe").VersionInfo.FileVersion
          chromedriver --version

      - name: Run scraper
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: true
        run: |
          $chromedriverPath = (Get-Command chromedriver).Source
          Write-Host "Using ChromeDriver at: $chromedriverPath"
          $env:CHROMEDRIVER_PATH = $chromedriverPath
          python scrape_cfn.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add sf6-tracker/src/master_rates.json
          $hasChanges = git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss UTC")
            git commit -m "Update master_rates.json - $timestamp"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "No changes to commit"
          }

