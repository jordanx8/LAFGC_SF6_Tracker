name: Scrape CFN Data
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      player_ids:
        description: 'Player IDs to scrape'
        required: false
        type: string
        default: ''
      phase:
        description: 'Phase to scrape'
        required: false
        type: string
        default: ''
permissions:
  contents: write
  actions: write
env:
  CHROMEDRIVER_PATH: /usr/bin/chromedriver
  GOOGLE_CHROME_PATH: /usr/bin/google-chrome
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      scrape_status: ${{ steps.run_scraper.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Display Chrome and ChromeDriver versions
        run: |
          google-chrome --version
          chromedriver --version
      - name: Run scraper with retry (3 attempts)
        id: run_scraper
        continue-on-error: true
        uses: nick-invision/retry@v4
        with:
          max_attempts: 3
          timeout_seconds: 1800
          command: |
            CMD="python scrape_cfn.py"
            if [ -n "${{ github.event.inputs.player_ids }}" ]; then
              CMD="$CMD ${{ github.event.inputs.player_ids }}"
            fi
            if [ -n "${{ github.event.inputs.phase }}" ]; then
              CMD="$CMD --phase ${{ github.event.inputs.phase }}"
            fi
            echo "Running: $CMD"
            $CMD
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
      - name: Configure Git
        if: steps.run_scraper.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push changes
        id: commit_scrape
        if: steps.run_scraper.outcome == 'success'
        run: |
          git add sf6-tracker/src/data/phase_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected; committing."
            git commit -m "Update CFN data [skip ci]"
            git pull --rebase origin main || git pull --no-rebase origin main
            git push
            touch committed_changes
          fi
      - name: Upload commit marker (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-flag
          path: committed_changes
          if-no-files-found: ignore
  refresh_cookies:
    needs: scrape
    runs-on: ubuntu-latest
    if: needs.scrape.outputs.scrape_status == 'failure'
    outputs:
      refresh_status: ${{ steps.refresh.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Display Chrome and ChromeDriver versions
        run: |
          google-chrome --version
          chromedriver --version
      - name: Refresh cookies with retry
        id: refresh
        continue-on-error: true
        uses: nick-invision/retry@v4
        with:
          max_attempts: 5
          retry_wait_seconds: 1800
          timeout_seconds: 600
          command: python refresh_cookies.py
        env:
          CAPCOM_USERNAME: ${{ secrets.CAPCOM_USERNAME }}
          CAPCOM_PASSWORD: ${{ secrets.CAPCOM_PASSWORD }}
          PLATFORM: playstation
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: true
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
  scrape_after_refresh:
    needs: refresh_cookies
    runs-on: ubuntu-latest
    if: needs.refresh_cookies.outputs.refresh_status == 'success'
    outputs:
      retry_status: ${{ steps.retry_scraper.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Display Chrome and ChromeDriver versions
        run: |
          google-chrome --version
          chromedriver --version
      - name: Run scraper after refresh
        id: retry_scraper
        continue-on-error: true
        uses: nick-invision/retry@v4
        with:
          max_attempts: 5
          timeout_seconds: 1800
          command: |
            CMD="python scrape_cfn.py"
            if [ -n "${{ github.event.inputs.player_ids }}" ]; then
              CMD="$CMD ${{ github.event.inputs.player_ids }}"
            fi
            if [ -n "${{ github.event.inputs.phase }}" ]; then
              CMD="$CMD --phase ${{ github.event.inputs.phase }}"
            fi
            echo "Running after refresh: $CMD"
            $CMD
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
      - name: Configure Git
        if: steps.retry_scraper.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push changes
        id: commit_retry
        if: steps.retry_scraper.outcome == 'success'
        run: |
          git add sf6-tracker/src/data/phase_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected; committing."
            git commit -m "Update CFN data (after refresh) [skip ci]"
            git pull --rebase origin main || git pull --no-rebase origin main
            git push
            touch committed_changes
          fi
      - name: Upload commit marker (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commit-flag
          path: committed_changes
          if-no-files-found: ignore
  final_status:
    needs: [scrape, refresh_cookies, scrape_after_refresh]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          ref: main
      - name: Ensure latest commit
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Current HEAD: $(git rev-parse HEAD)"
          echo "Current HEAD~1: $(git rev-parse HEAD~1)"
      - name: Download commit flag
        uses: actions/download-artifact@v4
        with:
          name: commit-flag
          path: .
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies for parser
        run: pip install requests
      # ---------------------------------------------------------
      #   ONLY RUN THE PARSER IF CHANGES WERE COMMITTED
      # ---------------------------------------------------------
      - name: Parse JSON changes
        if: hashFiles('committed_changes') != ''
        run: |
          echo "Committed changes found — running parser."
          python parse_json_changes.py > json_changes_summary.txt
      # If no changes, create an empty summary file anyway
      - name: No changes fallback file
        if: hashFiles('committed_changes') == ''
        run: |
          echo "No committed changes — skipping parser."
          echo "No data changes detected." > json_changes_summary.txt
      # ---------------------------------------------------------
      #   Add summary to GitHub Action Summary tab
      # ---------------------------------------------------------
      - name: Add summary to GitHub UI
        run: |
          echo "## 📝 Data Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat json_changes_summary.txt >> $GITHUB_STEP_SUMMARY
      # ---------------------------------------------------------
      # Upload artifacts (summary + parse output)
      # ---------------------------------------------------------
      - name: Upload summary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workflow-summary-${{ github.run_id }}
          retention-days: 30
          path: |
            summary.json
            json_changes_summary.txt
      # ---------------------------------------------------------
      # Final status logic (unchanged)
      # ---------------------------------------------------------
      - name: Final workflow status decision
        run: |
          echo "=== Workflow Results ==="
          echo "Initial Scrape: ${{ needs.scrape.result }}"
          echo "Cookie Refresh: ${{ needs.refresh_cookies.result }}"
          echo "Retry Scrape: ${{ needs.scrape_after_refresh.result }}"
          echo ""
          if [ "${{ needs.scrape.result }}" = "success" ]; then
            echo "✅ Initial scrape succeeded."
            exit 0
          fi
          if [ "${{ needs.refresh_cookies.result }}" = "success" ] && [ "${{ needs.scrape_after_refresh.result }}" = "success" ]; then
            echo "✅ Recovery process succeeded (refresh + retry)."
            exit 0
          fi
          if [ "${{ needs.scrape.result }}" = "failure" ] && [ "${{ needs.refresh_cookies.result }}" = "skipped" ]; then
            echo "❌ Initial scrape failed and no recovery attempted."
            exit 1
          fi
          if [ "${{ needs.refresh_cookies.result }}" = "failure" ]; then
            echo "❌ Cookie refresh failed."
            exit 1
          fi
          if [ "${{ needs.scrape_after_refresh.result }}" = "failure" ]; then
            echo "❌ Retry scrape after refresh failed."
            exit 1
          fi
          echo "⚠️ Unexpected workflow state."
          exit 1