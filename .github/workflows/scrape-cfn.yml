name: Scrape CFN Data
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      player_ids:
        description: 'Player IDs to scrape (comma-separated, leave empty for all)'
        required: false
        type: string
        default: ''
      phase:
        description: 'Phase to scrape (1-12, "all", or leave empty for latest phase only)'
        required: false
        type: string
        default: ''
      retry_after_refresh:
        description: 'Internal flag to prevent infinite loop'
        required: false
        type: boolean
        default: false
permissions:
  contents: write
  actions: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      # (your setup steps remain unchanged)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome
        uses: nanasess/setup-chromedriver@v2
      - name: Chrome version
        run: |
          google-chrome --version
          chromedriver --version
      - name: Run scraper with retry
        uses: nick-invision/retry@v4
        with:
          max_attempts: 3
          timeout_seconds: 600
          command: |
            CMD="python scrape_cfn.py"
            if [ -n "${{ github.event.inputs.player_ids }}" ]; then
              CMD="$CMD ${{ github.event.inputs.player_ids }}"
            fi
            if [ -n "${{ github.event.inputs.phase }}" ]; then
              CMD="$CMD --phase ${{ github.event.inputs.phase }}"
            fi
            $CMD
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
      - name: Configure Git
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit & push
        if: success()
        run: |
          git add sf6-tracker/src/data/phase_*.json
          if ! git diff --staged --quiet; then
            git commit -m "Update CFN data"
            git pull --rebase origin main
            git push
          fi
  trigger-refresh:
    needs: scrape
    if: |
      failure() &&
      github.event_name != 'workflow_dispatch' &&
      github.event.inputs.retry_after_refresh != true
    uses: ./.github/workflows/refresh-cookies.yml