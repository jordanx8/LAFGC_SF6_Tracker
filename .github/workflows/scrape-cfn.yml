name: Scrape CFN Data
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      player_ids:
        description: 'Player IDs to scrape'
        required: false
        type: string
        default: ''
      phase:
        description: 'Phase to scrape'
        required: false
        type: string
        default: ''
permissions:
  contents: write
  actions: write
env:
  CHROMEDRIVER_PATH: /usr/local/bin/chromedriver
  GOOGLE_CHROME_PATH: /usr/bin/google-chrome
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Display Chrome and ChromeDriver versions
        run: |
          echo "Chrome:"
          google-chrome --version
          echo "ChromeDriver:"
          chromedriver --version
          echo "Paths:"
          which google-chrome
          which chromedriver
      - name: Run scraper with retry (3 attempts)
        uses: nick-invision/retry@v4
        with:
          max_attempts: 3
          timeout_seconds: 1800
          command: |
            CMD="python scrape_cfn.py"
            if [ -n "${{ github.event.inputs.player_ids }}" ]; then
              CMD="$CMD ${{ github.event.inputs.player_ids }}"
            fi
            if [ -n "${{ github.event.inputs.phase }}" ]; then
              CMD="$CMD --phase ${{ github.event.inputs.phase }}"
            fi
            echo "Running: $CMD"
            $CMD
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
      - name: Configure Git
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push changes
        if: success()
        run: |
          git add sf6-tracker/src/data/phase_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CFN data"
            git pull --rebase origin main
            git push
          fi
  refresh_cookies:
    needs: scrape
    runs-on: ubuntu-latest
    if: failure()   # Always run if scrape failed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Display Chrome and ChromeDriver versions
        run: |
          echo "Chrome:"
          google-chrome --version
          echo "ChromeDriver:"
          chromedriver --version
      - name: Refresh cookies with retry (5 attempts, 30m delay)
        uses: nick-invision/retry@v4
        with:
          max_attempts: 5
          delay_seconds: 1800
          timeout_seconds: 600
          command: python refresh_cookies.py
        env:
          CAPCOM_USERNAME: ${{ secrets.CAPCOM_USERNAME }}
          CAPCOM_PASSWORD: ${{ secrets.CAPCOM_PASSWORD }}
          PLATFORM: playstation
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
  scrape_after_refresh:
    needs: refresh_cookies
    runs-on: ubuntu-latest
    if: success()   # Only retry scrape if refresh succeeded
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Setup Chrome and ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Display Chrome and ChromeDriver versions
        run: |
          echo "Chrome:"
          google-chrome --version
          echo "ChromeDriver:"
          chromedriver --version
      - name: Run scraper after refresh (5 attempts)
        uses: nick-invision/retry@v4
        with:
          max_attempts: 5
          timeout_seconds: 1800
          command: |
            CMD="python scrape_cfn.py"
            CMD="python scrape_cfn.py"
            if [ -n "${{ github.event.inputs.player_ids }}" ]; then
              CMD="$CMD ${{ github.event.inputs.player_ids }}"
            fi
            if [ -n "${{ github.event.inputs.phase }}" ]; then
              CMD="$CMD --phase ${{ github.event.inputs.phase }}"
            fi
            echo "Running after refresh: $CMD"
            $CMD
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          CHROMEDRIVER_PATH: ${{ env.CHROMEDRIVER_PATH }}
          GOOGLE_CHROME_PATH: ${{ env.GOOGLE_CHROME_PATH }}
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push changes
        run: |
          git add sf6-tracker/src/data/phase_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update CFN data (after refresh)"
            git pull --rebase origin main
            git push
          fi