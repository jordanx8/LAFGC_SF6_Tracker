name: Scrape CFN Data

on:
  schedule:
    # Run every 12 hours (at midnight and noon UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Chrome and ChromeDriver
        id: setup-chrome
        uses: nanasess/setup-chromedriver@v2
        
      - name: Display Chrome and ChromeDriver versions
        run: |
          google-chrome --version
          chromedriver --version

      - name: Run scraper
        env:
          SESSION_COOKIES: ${{ secrets.SESSION_COOKIES }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: true
          CHROMEDRIVER_PATH: /usr/local/bin/chromedriver
        run: |
          echo "Using ChromeDriver at: $CHROMEDRIVER_PATH"
          python scrape_cfn.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add sf6-tracker/src/data/phase_12.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update phase_12.json - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin main
            git push
          fi

